name: Market Tracker Daily

on:
  schedule:
    - cron: '0 7 * * 1-5'  # Lunes a viernes a las 7:00 UTC (8:00 CET / 9:00 CEST)
  workflow_dispatch:        # Permite ejecutarlo manualmente desde GitHub

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance openpyxl

      - name: Run Market Tracker
        run: python market_tracker.py

      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-tracker-${{ github.run_id }}
          path: market_tracker_*.xlsx
          retention-days: 30
