name: Market Tracker Daily

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 9:00 EST (nov–mar, UTC-5)
    - cron: '0 13 * * 1-5'   # 9:00 EDT (mar–nov, UTC-4)
  workflow_dispatch:        # Permite ejecutarlo manualmente desde GitHub

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance openpyxl

      - name: Run Market Tracker
        run: python market_tracker.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}

      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-tracker-${{ github.run_id }}
          path: market_tracker_*.xlsx
          retention-days: 30
