name: Market Tracker Daily

on:
  workflow_dispatch:        # Disparado por cron-job.org a las 9:30 EDT

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance openpyxl pillow

      - name: Run Market Tracker
        run: python market_tracker.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Guardar caché FRED en repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add fred_cache.json spi_history.json || true
          git diff --cached --quiet || git commit -m "Update FRED cache + SPI history"
          git push || true

      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-tracker-${{ github.run_id }}
          path: market_tracker_*.xlsx
          retention-days: 30
